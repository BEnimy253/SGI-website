<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập SGI Portal</title>
    <style>
      :root {
        --blue: #005edc;
        --blue-dark: #003b8f;
        --orange: #f47b20;
        --ink: #10213b;
        --muted: #64748b;
        --line: #dbe7f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background: #f4f8fd;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .login-shell {
        width: min(100%, 960px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        overflow: hidden;
        border: 1px solid rgba(0, 94, 220, 0.16);
        border-radius: 8px;
        background: white;
        box-shadow: 0 24px 70px rgba(0, 59, 143, 0.14);
      }

      .brand-panel {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 40px;
        padding: 44px;
        background: var(--blue-dark);
        color: white;
      }

      .brand-logo {
        width: min(100%, 330px);
        border-radius: 8px;
        background: white;
        padding: 18px 22px;
      }

      .brand-logo img {
        display: block;
        width: 100%;
        height: auto;
      }

      .brand-copy p {
        margin: 0 0 10px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.82rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .brand-copy h1 {
        margin: 0;
        max-width: 560px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .login-panel {
        display: grid;
        align-content: center;
        padding: 42px;
      }

      .mobile-logo {
        display: none;
        width: 220px;
        margin: 0 auto 26px;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 2rem;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0 0 26px;
        color: var(--muted);
      }

      .error-box {
        margin-bottom: 18px;
        border: 1px solid rgba(190, 18, 60, 0.24);
        border-radius: 8px;
        background: #fff1f2;
        padding: 12px 14px;
        color: #be123c;
        font-size: 0.92rem;
      }

      .hidden {
        display: none;
      }

      .form-stack {
        display: grid;
        gap: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.92rem;
        font-weight: 800;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbff;
        padding: 13px 14px;
        color: var(--ink);
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: var(--blue);
        background: white;
        box-shadow: 0 0 0 3px rgba(0, 94, 220, 0.13);
      }

      button {
        width: 100%;
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        background: var(--orange);
        color: white;
        font: inherit;
        font-weight: 850;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.04);
      }

      @media (max-width: 820px) {
        .login-shell {
          grid-template-columns: 1fr;
        }

        .brand-panel {
          display: none;
        }

        .login-panel {
          padding: 32px 22px;
        }

        .mobile-logo {
          display: block;
        }

        h2,
        .subtitle {
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <main class="login-shell">
      <section class="brand-panel" aria-label="SGI International College">
        <div class="brand-logo">
          <img src="/images/LogoSGI.png" alt="SGI International College" />
        </div>

        <div class="brand-copy">
          <p>SGI Portal</p>
          <h1>Hệ thống quản lý học sinh và điểm số</h1>
        </div>
      </section>

      <section class="login-panel">
        <img class="mobile-logo" src="/images/LogoSGI.png" alt="SGI International College" />

        <h2>Đăng nhập</h2>
        <p class="subtitle">Vào hệ thống theo vai trò được phân quyền</p>

        <div id="errorBox" class="error-box hidden"></div>

        <form action="/login" method="POST" class="form-stack">
          <div>
            <label for="username">Tài khoản</label>
            <input
              id="username"
              name="username"
              type="text"
              required
              autocomplete="username"
              placeholder="Nhập tài khoản"
            />
          </div>

          <div>
            <label for="password">Mật khẩu</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
              placeholder="Nhập mật khẩu"
            />
          </div>

          <button type="submit">Đăng nhập</button>
        </form>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const hasError = params.get("error");
      const errorBox = document.getElementById("errorBox");
      const errorList = {
        username: "Tài khoản không tồn tại.",
        password: "Mật khẩu không đúng.",
        status: "Tài khoản chưa được kích hoạt.",
      };

      if (hasError && errorList[hasError]) {
        errorBox.textContent = errorList[hasError];
        errorBox.classList.remove("hidden");
      }
    </script>
  </body>
</html>
