<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="/output.css" />
    <style>
      :root {
        --sgi-blue: #005edc;
        --sgi-blue-dark: #003b8f;
        --sgi-orange: #f47b20;
        --sgi-ink: #11233f;
        --sgi-muted: #64748b;
        --sgi-line: #dbe7f5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
        color: var(--sgi-ink);
        background:
          radial-gradient(circle at 18% 18%, rgba(244, 123, 32, 0.22), transparent 28%),
          linear-gradient(135deg, #f8fbff 0%, #edf5ff 38%, #dcecff 100%);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .login-shell {
        position: relative;
        width: min(100%, 980px);
        min-height: 580px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 430px);
        overflow: hidden;
        border: 1px solid rgba(0, 94, 220, 0.16);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 70px rgba(0, 59, 143, 0.18);
      }

      .brand-panel {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 48px;
        background:
          linear-gradient(145deg, rgba(0, 94, 220, 0.94), rgba(0, 59, 143, 0.98)),
          var(--sgi-blue);
        color: white;
      }

      .brand-panel::after {
        content: "";
        position: absolute;
        right: -90px;
        bottom: -90px;
        width: 260px;
        height: 260px;
        border-radius: 999px;
        border: 44px solid rgba(244, 123, 32, 0.78);
      }

      .brand-logo {
        position: relative;
        z-index: 1;
        width: min(100%, 360px);
        border-radius: 18px;
        background: white;
        padding: 20px 24px;
        box-shadow: 0 18px 42px rgba(0, 27, 77, 0.2);
      }

      .brand-logo img {
        display: block;
        width: 100%;
        height: auto;
      }

      .brand-copy {
        position: relative;
        z-index: 1;
        max-width: 460px;
      }

      .brand-copy p {
        margin: 0 0 14px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .brand-copy h1 {
        margin: 0;
        font-size: clamp(2.1rem, 5vw, 4rem);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .login-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 44px;
        background: rgba(255, 255, 255, 0.95);
      }

      .login-card {
        width: 100%;
        max-width: 360px;
      }

      .mobile-logo {
        display: none;
        width: 220px;
        margin: 0 auto 28px;
      }

      .login-card h2 {
        margin: 0 0 8px;
        color: var(--sgi-ink);
        font-size: 2rem;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .login-card > p {
        margin: 0 0 28px;
        color: var(--sgi-muted);
      }

      .error-box {
        margin-bottom: 18px;
        border: 1px solid rgba(244, 63, 94, 0.22);
        border-radius: 12px;
        background: #fff1f2;
        padding: 12px 14px;
        color: #be123c;
        font-size: 0.92rem;
      }

      .hidden {
        display: none;
      }

      .form-stack {
        display: grid;
        gap: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--sgi-ink);
        font-size: 0.92rem;
        font-weight: 700;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--sgi-line);
        border-radius: 12px;
        background: #f8fbff;
        padding: 14px 16px;
        color: var(--sgi-ink);
        font: inherit;
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      input:focus {
        border-color: var(--sgi-blue);
        background: white;
        box-shadow: 0 0 0 4px rgba(0, 94, 220, 0.13);
      }

      input::placeholder {
        color: #94a3b8;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--sgi-orange), #ff9b45);
        padding: 14px 18px;
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 14px 30px rgba(244, 123, 32, 0.28);
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          filter 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 36px rgba(244, 123, 32, 0.34);
        filter: saturate(1.04);
      }

      button:active {
        transform: translateY(0);
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
          padding: 18px;
        }

        .login-shell {
          min-height: auto;
          grid-template-columns: 1fr;
          border-radius: 20px;
        }

        .brand-panel {
          display: none;
        }

        .login-panel {
          padding: 32px 22px;
        }

        .mobile-logo {
          display: block;
        }

        .login-card h2,
        .login-card > p {
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <main class="login-shell">
      <section class="brand-panel" aria-label="SGI International College">
        <div class="brand-logo">
          <img src="/LogoSGI.png" alt="SGI International College" />
        </div>

        <div class="brand-copy">
          <p>Student portal</p>
          <h1>SGI International College</h1>
        </div>
      </section>

      <section class="login-panel">
        <div class="login-card">
          <img
            class="mobile-logo"
            src="/LogoSGI.png"
            alt="SGI International College"
          />

          <h2>Đăng nhập</h2>
          <p>Vào hệ thống SGI Website</p>

          <div id="errorBox" class="error-box hidden"></div>

          <form action="/login" method="POST" class="form-stack">
            <div>
              <label for="username">Tài khoản</label>
              <input
                id="username"
                name="username"
                type="text"
                required
                autocomplete="username"
                placeholder="Nhập tài khoản"
              />
            </div>

            <div>
              <label for="password">Mật khẩu</label>
              <input
                id="password"
                name="password"
                type="password"
                required
                autocomplete="current-password"
                placeholder="Nhập mật khẩu"
              />
            </div>

            <button type="submit">Đăng nhập</button>
          </form>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const hasError = params.get("error");
      const errorBox = document.getElementById("errorBox");
      const errorList = {
        username: "Tài khoản không tồn tại.",
        password: "Mật khẩu không đúng.",
      };

      if (hasError && errorList[hasError]) {
        errorBox.textContent = errorList[hasError];
        errorBox.classList.remove("hidden");
      }
    </script>
  </body>
</html>
