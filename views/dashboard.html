<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng điểm học sinh</title>
    <link rel="stylesheet" href="/output.css" />
    <style>
      :root {
        --sgi-blue: #005edc;
        --sgi-blue-dark: #003b8f;
        --sgi-orange: #f47b20;
        --ink: #10213b;
        --muted: #64748b;
        --line: #dbe7f5;
        --panel: #ffffff;
        --soft: #f6f9fe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(0, 94, 220, 0.09), transparent 340px),
          #f4f8fd;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        border-bottom: 1px solid rgba(0, 94, 220, 0.12);
        background: rgba(255, 255, 255, 0.92);
        padding: 18px clamp(18px, 4vw, 44px);
        backdrop-filter: blur(12px);
      }

      .brand {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 16px;
      }

      .brand img {
        width: 168px;
        max-width: 42vw;
        height: auto;
      }

      .brand-title {
        min-width: 0;
      }

      .brand-title p {
        margin: 0 0 3px;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .brand-title h1 {
        margin: 0;
        font-size: clamp(1.2rem, 2.4vw, 1.75rem);
        line-height: 1.2;
        letter-spacing: 0;
      }

      .logout-button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: var(--sgi-orange);
        padding: 0 18px;
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .logout-button:hover {
        filter: brightness(1.04);
      }

      main {
        width: min(1180px, calc(100% - 36px));
        margin: 0 auto;
        padding: 34px 0 48px;
      }

      .profile-panel,
      .score-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 42px rgba(0, 59, 143, 0.08);
      }

      .profile-panel {
        padding: clamp(20px, 4vw, 30px);
      }

      .section-kicker {
        margin: 0 0 7px;
        color: var(--sgi-blue);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .student-name {
        margin: 0;
        color: var(--ink);
        font-size: clamp(1.7rem, 4vw, 2.8rem);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
        margin-top: 26px;
      }

      .profile-item {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        padding: 15px;
      }

      .profile-item span {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      .profile-item strong {
        display: block;
        min-width: 0;
        overflow-wrap: anywhere;
        color: var(--ink);
        font-size: 1rem;
        line-height: 1.35;
      }

      .score-panel {
        margin-top: 24px;
        overflow: hidden;
      }

      .panel-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        padding: 20px 24px;
      }

      .panel-heading h2 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: 0;
      }

      .score-count {
        border-radius: 999px;
        background: rgba(0, 94, 220, 0.1);
        padding: 6px 12px;
        color: var(--sgi-blue-dark);
        font-size: 0.9rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 15px 18px;
        text-align: left;
        vertical-align: middle;
      }

      th {
        border-bottom: 1px solid var(--line);
        background: #f9fbff;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .score-row {
        cursor: pointer;
        outline: none;
      }

      .score-row td {
        border-bottom: 1px solid #edf3fb;
      }

      .score-row:hover,
      .score-row:focus-visible {
        background: #f7fbff;
      }

      .subject-cell {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 12px;
      }

      .chevron {
        width: 9px;
        height: 9px;
        flex: 0 0 auto;
        border-right: 2px solid var(--sgi-blue);
        border-bottom: 2px solid var(--sgi-blue);
        transform: rotate(-45deg);
        transition: transform 180ms ease;
      }

      .score-row[aria-expanded="true"] .chevron {
        transform: rotate(45deg);
      }

      .subject-main {
        min-width: 0;
      }

      .subject-main strong {
        display: block;
        overflow-wrap: anywhere;
        line-height: 1.3;
      }

      .subject-main span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .final-score {
        color: var(--sgi-blue-dark);
        font-size: 1.08rem;
        font-weight: 900;
      }

      .score-detail-row td {
        padding: 0;
        border-bottom: 1px solid #edf3fb;
        background: #fbfdff;
      }

      .detail-panel {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 220ms ease,
          padding 220ms ease;
      }

      .score-detail-row.open .detail-panel {
        max-height: 340px;
        padding: 18px 24px 22px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(8, minmax(94px, 1fr));
        gap: 10px;
      }

      .detail-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        padding: 12px;
      }

      .detail-item span {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .detail-item strong {
        color: var(--ink);
        font-size: 1rem;
      }

      .empty-state,
      .error-state {
        padding: 26px 24px;
        color: var(--muted);
      }

      .error-state {
        color: #be123c;
      }

      @media (max-width: 900px) {
        .profile-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .detail-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .page-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .logout-button {
          width: 100%;
        }

        main {
          width: min(100% - 24px, 1180px);
          padding-top: 18px;
        }

        .profile-grid {
          grid-template-columns: 1fr;
        }

        .panel-heading {
          align-items: flex-start;
          flex-direction: column;
          padding: 18px;
        }

        .score-detail-row.open .detail-panel {
          padding: 14px 18px 18px;
        }
      }
    </style>
  </head>

  <body>
    <header class="page-header">
      <div class="brand">
        <img src="/LogoSGI.png" alt="SGI International College" />
        <div class="brand-title">
          <p>Student portal</p>
          <h1>Bảng điểm học sinh</h1>
        </div>
      </div>

      <form action="/logout" method="POST">
        <button type="submit" class="logout-button">Đăng xuất</button>
      </form>
    </header>

    <main>
      <section class="profile-panel" aria-labelledby="studentName">
        <p class="section-kicker">Thông tin cá nhân</p>
        <h2 class="student-name" id="studentName">Đang tải...</h2>

        <div class="profile-grid">
          <div class="profile-item">
            <span>Ngày sinh</span>
            <strong id="dateOfBirth">Đang tải...</strong>
          </div>
          <div class="profile-item">
            <span>Lớp</span>
            <strong id="classCode">Đang tải...</strong>
          </div>
          <div class="profile-item">
            <span>Ngành</span>
            <strong id="major">Đang tải...</strong>
          </div>
          <div class="profile-item">
            <span>Khóa học</span>
            <strong id="course">Đang tải...</strong>
          </div>
          <div class="profile-item">
            <span>Mã học sinh</span>
            <strong id="studentCode">Đang tải...</strong>
          </div>
        </div>
      </section>

      <section class="score-panel" aria-labelledby="scoreHeading">
        <div class="panel-heading">
          <h2 id="scoreHeading">Điểm các môn</h2>
          <span class="score-count" id="scoreCount">0 môn</span>
        </div>

        <div class="table-wrap" id="scoreTableWrap">
          <table>
            <thead>
              <tr>
                <th>Môn học</th>
                <th>Mã môn</th>
                <th>Số tiết</th>
                <th>Điểm tổng</th>
              </tr>
            </thead>
            <tbody id="scoreRows">
              <tr>
                <td colspan="4" class="empty-state">Đang tải dữ liệu...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const missingText = "-";
      const scoreRows = document.getElementById("scoreRows");

      function formatValue(value, fallback = missingText) {
        if (value === null || value === undefined || value === "") {
          return fallback;
        }

        return value;
      }

      function formatScore(value, fallback = missingText) {
        if (value === null || value === undefined || Number.isNaN(value)) {
          return fallback;
        }

        return Number(value).toLocaleString("vi-VN", {
          minimumFractionDigits: 1,
          maximumFractionDigits: 1,
        });
      }

      function formatDate(value) {
        if (!value) {
          return missingText;
        }

        const rawDate = String(value);
        const date = new Date(
          rawDate.includes("T") ? rawDate : `${rawDate}T00:00:00`,
        );

        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return date.toLocaleDateString("vi-VN", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        });
      }

      function setText(id, value, fallback = missingText) {
        document.getElementById(id).textContent = formatValue(value, fallback);
      }

      function createCell(text, className) {
        const cell = document.createElement("td");
        cell.textContent = text;

        if (className) {
          cell.className = className;
        }

        return cell;
      }

      function createSubjectCell(score) {
        const cell = document.createElement("td");
        const wrapper = document.createElement("div");
        const chevron = document.createElement("span");
        const subject = document.createElement("div");
        const name = document.createElement("strong");
        const order = document.createElement("span");

        wrapper.className = "subject-cell";
        chevron.className = "chevron";
        subject.className = "subject-main";
        name.textContent = formatValue(score.subjectName);
        order.textContent = `Thứ tự môn: ${formatValue(score.subjectOrder)}`;

        subject.append(name, order);
        wrapper.append(chevron, subject);
        cell.append(wrapper);

        return cell;
      }

      function createDetailItem(label, value, isScore = true) {
        const item = document.createElement("div");
        const labelElement = document.createElement("span");
        const valueElement = document.createElement("strong");

        item.className = "detail-item";
        labelElement.textContent = label;
        valueElement.textContent = isScore ? formatScore(value) : value;

        item.append(labelElement, valueElement);
        return item;
      }

      function createDetailRow(score, rowId) {
        const row = document.createElement("tr");
        const cell = document.createElement("td");
        const panel = document.createElement("div");
        const grid = document.createElement("div");

        row.className = "score-detail-row";
        row.id = `${rowId}-detail`;
        cell.colSpan = 4;
        panel.className = "detail-panel";
        grid.className = "detail-grid";

        grid.append(
          createDetailItem("KTTX 1", score.kttx1),
          createDetailItem("KTTX 2", score.kttx2),
          createDetailItem("KTĐK 1", score.ktdk1),
          createDetailItem("KTĐK 2", score.ktdk2),
          createDetailItem("ĐTB", score.processScoreAverage),
          createDetailItem("KTM 1", score.ktm1),
          createDetailItem("KTM 2", score.ktm2),
          createDetailItem("Điểm tổng", score.finalScore, true),
        );

        panel.append(grid);
        cell.append(panel);
        row.append(cell);

        return row;
      }

      function toggleDetail(row, detailRow) {
        const isOpen = row.getAttribute("aria-expanded") === "true";
        row.setAttribute("aria-expanded", String(!isOpen));
        detailRow.classList.toggle("open", !isOpen);
      }

      function renderScores(scores) {
        scoreRows.innerHTML = "";
        document.getElementById("scoreCount").textContent = `${scores.length} môn`;

        if (scores.length === 0) {
          const emptyRow = document.createElement("tr");
          const emptyCell = createCell("Chưa có dữ liệu điểm.", "empty-state");

          emptyCell.colSpan = 4;
          emptyRow.append(emptyCell);
          scoreRows.append(emptyRow);
          return;
        }

        scores.forEach((score, index) => {
          const rowId = `score-${index}`;
          const row = document.createElement("tr");
          const detailRow = createDetailRow(score, rowId);

          row.className = "score-row";
          row.id = rowId;
          row.tabIndex = 0;
          row.setAttribute("role", "button");
          row.setAttribute("aria-expanded", "false");
          row.setAttribute("aria-controls", detailRow.id);

          row.append(
            createSubjectCell(score),
            createCell(formatValue(score.subjectCode)),
            createCell(formatValue(score.period)),
            createCell(formatScore(score.finalScore, "Chưa đủ điểm"), "final-score"),
          );

          row.addEventListener("click", () => toggleDetail(row, detailRow));
          row.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              toggleDetail(row, detailRow);
            }
          });

          scoreRows.append(row, detailRow);
        });
      }

      function renderError(message) {
        scoreRows.innerHTML = "";

        const row = document.createElement("tr");
        const cell = createCell(message, "error-state");

        cell.colSpan = 4;
        row.append(cell);
        scoreRows.append(row);
      }

      async function loadStudentInfo() {
        try {
          const response = await fetch("/api/student-info");

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.message || "Không lấy được dữ liệu học sinh.");
          }

          const data = await response.json();
          const student = data.student;

          setText("studentName", student.fullName, "Chưa có họ tên");
          setText("dateOfBirth", formatDate(student.dateOfBirth));
          setText("classCode", student.classCode);
          setText("major", student.major);
          setText("course", student.course);
          setText("studentCode", student.studentCode);
          renderScores(data.scores || []);
        } catch (error) {
          console.error(error);
          setText("studentName", "Lỗi tải dữ liệu", "Lỗi tải dữ liệu");
          renderError(error.message);
        }
      }

      loadStudentInfo();
    </script>
  </body>
</html>
