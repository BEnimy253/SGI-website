<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGI Portal</title>
    <link rel="stylesheet" href="/dashboard.css" />
    <script src="/dashboard.js" defer></script>
  </head>

  <body>
    <header class="topbar">
      <div class="brand">
        <img src="/LogoSGI.png" alt="SGI International College" />
        <div>
          <p id="roleLabel">SGI Portal</p>
          <h1 id="pageTitle">Đang tải...</h1>
        </div>
      </div>

      <div class="account-box">
        <span id="accountName">...</span>
        <form action="/logout" method="POST">
          <button type="submit" class="button button-accent">Đăng xuất</button>
        </form>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <section class="content" id="app">
        <div class="state-panel">Đang tải dữ liệu...</div>
      </section>
    </main>

    <div class="toast hidden" id="toast"></div>
  </body>
</html>
